<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PULSE">
<meta name="theme-color" content="#080a0e">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23080a0e'/><text y='.9em' font-size='80' x='10'>📰</text></svg>">
<title>PULSE / Daily Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #080a0e;
    --bg-1: #0d1117;
    --bg-2: #141920;
    --bg-3: #1c2330;
    --border: rgba(255,255,255,0.06);
    --border-active: rgba(0,255,170,0.3);
    --accent: #00ffaa;
    --accent-dim: rgba(0,255,170,0.12);
    --accent-glow: rgba(0,255,170,0.06);
    --red: #ff4466;
    --gold: #ffcc44;
    --blue: #44aaff;
    --purple: #aa66ff;
    --text-1: rgba(255,255,255,0.92);
    --text-2: rgba(255,255,255,0.55);
    --text-3: rgba(255,255,255,0.28);
    --tab-h: 64px;
    --header-h: 72px;
    --safe-bottom: env(safe-area-inset-bottom, 16px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg-0); color: var(--text-1); overflow: hidden; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── LAYOUT ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    height: var(--header-h);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: var(--bg-0);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,170,0.5);
  }
  .logo span { color: var(--text-3); font-size: 10px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.2em; display: block; margin-top: -4px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .date-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-3);
    text-align: right;
    line-height: 1.4;
  }
  .dot-live {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* ── SCROLL AREA ── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 8px);
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* ── TAB PANEL ── */
  .tab-panel { display: none; animation: fadeUp 0.3s ease; }
  .tab-panel.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── SECTION HEADER ── */
  .section-header {
    padding: 24px 20px 12px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.08em;
    color: var(--text-1);
  }
  .section-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-3);
  }

  /* ── HERO CARD ── */
  .hero-card {
    margin: 0 16px 12px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease;
  }
  .hero-card:active { transform: scale(0.98); }
  .hero-card:hover { border-color: var(--border-active); }
  .hero-thumb {
    width: 100%; height: 160px;
    background: var(--bg-3);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .hero-thumb-inner {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #0d1117 0%, #1c2330 50%, #141920 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .hero-thumb-inner::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(0,255,170,0.08) 0%, transparent 60%);
  }
  .hero-thumb-emoji { font-size: 56px; opacity: 0.7; }
  .hero-overlay {
    position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
    background: linear-gradient(transparent, var(--bg-2));
  }
  .hero-body { padding: 14px 16px 16px; }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.15em; color: var(--accent);
    background: var(--accent-dim); border-radius: 4px;
    padding: 3px 8px; margin-bottom: 8px;
    text-transform: uppercase;
  }
  .hero-title { font-size: 16px; font-weight: 700; line-height: 1.5; color: var(--text-1); margin-bottom: 8px; }
  .hero-desc { font-size: 12px; color: var(--text-2); line-height: 1.7; }
  .hero-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
  .hero-source { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-3); }
  .hero-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-3); }

  /* ── NEWS LIST ── */
  .news-list { padding: 0 16px; display: flex; flex-direction: column; gap: 2px; }

  .news-item {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex; align-items: flex-start; gap: 14px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    position: relative; overflow: hidden;
    margin-bottom: 8px;
  }
  .news-item:active { background: var(--bg-2); }
  .news-item::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--item-color, var(--accent));
    opacity: 0;
    transition: opacity 0.15s;
  }
  .news-item:active::before { opacity: 1; }

  .news-icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--bg-3);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .news-content { flex: 1; min-width: 0; }
  .news-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.12em; color: var(--item-color, var(--accent));
    text-transform: uppercase; margin-bottom: 4px; opacity: 0.8;
  }
  .news-title { font-size: 13px; font-weight: 500; line-height: 1.55; color: var(--text-1); }
  .news-footer { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .news-source { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-3); }
  .news-dot { width: 2px; height: 2px; border-radius: 50%; background: var(--text-3); }
  .news-time { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-3); }
  .news-importance {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--item-color, var(--accent));
    flex-shrink: 0; margin-top: 4px;
    box-shadow: 0 0 6px var(--item-color, var(--accent));
  }

  /* ── THREAD LIST (2ch style) ── */
  .thread-item {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 8px;
    position: relative; overflow: hidden;
  }
  .thread-item:active { background: var(--bg-2); }
  .thread-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .thread-num {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--accent); opacity: 0.5; font-weight: 500;
  }
  .thread-board {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--text-3); background: var(--bg-3);
    padding: 2px 6px; border-radius: 4px; letter-spacing: 0.05em;
  }
  .thread-title { font-size: 13px; font-weight: 500; line-height: 1.6; color: var(--text-1); margin-bottom: 8px; }
  .thread-preview {
    font-size: 11px; color: var(--text-2); line-height: 1.7;
    background: var(--bg-3); border-radius: 8px;
    padding: 8px 12px; border-left: 2px solid var(--accent);
    border-left-color: var(--accent); opacity: 0.8;
  }
  .thread-footer { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
  .thread-stat { display: flex; align-items: center; gap: 4px; }
  .thread-stat-icon { font-size: 11px; }
  .thread-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-3); }
  .thread-hot {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--red); background: rgba(255,68,102,0.1);
    padding: 2px 8px; border-radius: 4px; letter-spacing: 0.1em;
  }

  /* ── IMAGE GEN GRID ── */
  .imggen-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
  .imggen-item {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .imggen-item:hover { border-color: rgba(170,102,255,0.3); }
  .imggen-preview {
    height: 120px;
    background: var(--bg-3);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .imggen-gradient {
    position: absolute; inset: 0;
  }
  .imggen-label {
    position: absolute; bottom: 8px; right: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    background: rgba(0,0,0,0.7); color: var(--text-2);
    padding: 2px 7px; border-radius: 4px; letter-spacing: 0.08em;
  }
  .imggen-body { padding: 12px 14px 14px; }
  .imggen-tool {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--purple); letter-spacing: 0.1em;
    background: rgba(170,102,255,0.1); border-radius: 4px;
    padding: 2px 8px; margin-bottom: 7px;
  }
  .imggen-title { font-size: 13px; font-weight: 500; color: var(--text-1); margin-bottom: 5px; }
  .imggen-desc { font-size: 11px; color: var(--text-2); line-height: 1.65; }
  .imggen-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
  .imggen-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--text-3); background: var(--bg-3);
    padding: 2px 7px; border-radius: 4px;
  }

  /* ── DIVIDER ── */
  .divider { height: 1px; background: var(--border); margin: 4px 16px 12px; }
  .tab-btn[data-tab="domestic"] { --tab-color: var(--accent); }
  .tab-btn[data-tab="world"] { --tab-color: var(--blue); }
  .tab-btn[data-tab="aitrend"] { --tab-color: var(--gold); }
  .tab-btn[data-tab="imagegen"] { --tab-color: var(--purple); }
  .tab-btn[data-tab="tech"] { --tab-color: #ff8c44; }
  .tab-btn[data-tab="agent"] { --tab-color: #00e5ff; }
  .tab-icon { font-size: 18px; transition: transform 0.2s; }
  .tab-btn.active .tab-icon { transform: scale(1.1); }

  /* ── BOTTOM TABS: scrollable ── */
  .bottom-tabs {
    position: fixed;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    height: calc(var(--tab-h) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: rgba(8,10,14,0.92);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border-top: 1px solid var(--border);
    display: flex; align-items: stretch;
    z-index: 100;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .bottom-tabs::-webkit-scrollbar { display: none; }
  .bottom-tabs::before {
    content: '';
    position: absolute; top: -1px; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }
  .tab-btn {
    flex: 0 0 72px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    background: none; border: none;
    color: var(--text-3);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 9px; font-weight: 500;
    cursor: pointer;
    transition: color 0.2s;
    position: relative; padding: 0;
    padding-top: 8px;
    white-space: nowrap;
  }
  .tab-btn::before {
    content: '';
    position: absolute; top: 0; left: 15%; right: 15%; height: 2px;
    background: var(--tab-color);
    border-radius: 0 0 2px 2px;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 0 8px var(--tab-color);
  }
  .tab-btn.active { color: var(--tab-color); }
  .tab-btn.active::before { opacity: 1; }

  /* ── EMPTY SPACER ── */
  .bottom-spacer { height: 80px; }

  /* ── SCROLLBAR FIX ── */
  * { scrollbar-width: none; }

  /* ── DETAIL MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(4,6,10,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-sheet {
    width: 100%; max-width: 480px; margin: 0 auto;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    padding: 0 0 calc(var(--safe-bottom, 16px) + 24px);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 88dvh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--text-3); margin: 14px auto 0;
  }
  .modal-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .modal-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.15em; color: var(--modal-color, var(--accent));
    background: rgba(0,255,170,0.08); border-radius: 4px;
    padding: 3px 8px; margin-bottom: 8px;
    text-transform: uppercase;
    border: 1px solid rgba(0,255,170,0.15);
  }
  .modal-title {
    font-size: 15px; font-weight: 700; line-height: 1.55;
    color: var(--text-1); margin-bottom: 10px; padding-right: 36px;
  }
  .modal-meta { display: flex; align-items: center; gap: 8px; }
  .modal-source { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-3); }
  .modal-time { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-3); }
  .modal-sep { width: 2px; height: 2px; border-radius: 50%; background: var(--text-3); }
  .modal-body { padding: 18px 20px; }
  .modal-summary {
    font-size: 13px; color: var(--text-2); line-height: 1.85;
    border-left: 2px solid var(--modal-color, var(--accent));
    padding-left: 12px; margin-bottom: 18px;
  }
  .modal-divider-label {
    display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
  }
  .modal-divider-label span {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.15em; color: var(--text-3); text-transform: uppercase;
    white-space: nowrap;
  }
  .modal-divider-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .modal-detail {
    font-size: 13px; color: var(--text-2); line-height: 1.9;
  }
  .modal-detail p { margin-bottom: 13px; }
  .modal-detail p:last-child { margin-bottom: 0; }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg-3); border: 1px solid var(--border);
    color: var(--text-2); font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }
  .tap-hint {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--accent); opacity: 0.5; margin-top: 5px;
    letter-spacing: 0.08em;
  }

  /* ── UPDATE PANEL ── */
  .update-btn {
    position: fixed; top: 18px; right: 20px; z-index: 50;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg-3); border: 1px solid var(--border);
    color: var(--text-2); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
  }
  .update-btn:active { background: var(--bg-2); border-color: var(--accent); }

  .update-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(4,6,10,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .update-overlay.open { opacity: 1; pointer-events: all; }

  .update-header {
    padding: 56px 20px 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .update-header-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 22px;
    letter-spacing: 0.1em; color: var(--accent);
    margin-bottom: 4px;
  }
  .update-header-sub {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--text-3); line-height: 1.6;
  }
  .update-close {
    position: absolute; top: 52px; right: 20px;
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--bg-3); border: 1px solid var(--border);
    color: var(--text-2); font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  .update-body { flex: 1; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }

  .update-textarea {
    flex: 1; min-height: 220px;
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
    color: var(--text-1); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; line-height: 1.6; resize: none;
    outline: none; transition: border-color 0.2s;
  }
  .update-textarea:focus { border-color: var(--accent); }
  .update-textarea::placeholder { color: var(--text-3); }

  .update-actions { display: flex; gap: 10px; }
  .update-apply-btn {
    flex: 1; padding: 14px;
    background: var(--accent); border: none; border-radius: 12px;
    color: #080a0e; font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: opacity 0.15s;
  }
  .update-apply-btn:active { opacity: 0.8; }
  .update-cancel-btn {
    padding: 14px 20px;
    background: var(--bg-3); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text-2);
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
    cursor: pointer;
  }

  .update-status {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-align: center; padding: 8px; border-radius: 8px;
    display: none;
  }
  .update-status.success { display: block; color: var(--accent); background: var(--accent-dim); }
  .update-status.error { display: block; color: var(--red); background: rgba(255,68,102,0.1); }

  .update-steps {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
  }
  .update-steps-title {

<script>
/* ============================================================
   📰 NEWS DATA — ここのデータを書き換えるだけで翌日に更新できます
   ============================================================ */
const NEWS_DATA = {

  /* ── 国内ニュース ── */
  domestic: {
    hero: {
      emoji: "🌀",
      tag: "気象",
      title: "台風6号「チャンミー」、明日3日に関東へ最接近―九州〜東日本で暴風・大雨に厳重警戒",
      desc: "台風6号チャンミーは2日9時現在、屋久島の南西約190kmを北北東に毎時25kmで進行中。中心気圧975hPa・最大風速25m/s。3日朝の通勤・通学時間帯も大雨や横殴りの雨となる見込みで、気象庁は東海・関東甲信越を中心に厳重警戒を呼びかけている。",
      detail: "<p>台風6号（チャンミー）は2日午前9時現在、屋久島の南西約190kmの海上を北北東に毎時25kmで進んでいる。中心気圧は975ヘクトパスカル、中心付近の最大風速は25m/s、最大瞬間風速は45m/sに達する見込み。</p><p>気象庁の予報によると、2日夜には足摺岬（高知県）の南約100kmに達し、3日には浜松市の南約60km付近を通過する見通し。その後、温帯低気圧に変わりながら4日には日本の東へ抜ける予想だ。</p><p>九州・四国では2日中、東海・関東では3日の朝の通勤・通学時間帯にかけて最も荒天となる見込み。特に線状降水帯の発生が懸念されており、土砂災害や浸水害への警戒が必要。交通機関への大規模な遅延・運休も予想されている。沖縄では台風通過に伴い16人が軽傷を負ったと報告された。</p>",
      source: "気象庁 / tenki.jp",
      time: "10:45"
    },
    items: [
      { color: "var(--accent)", icon: "🏛️", tag: "政治", title: "高市政権、2月衆院選で自民単独3分の2超の歴史的大勝―修憲手続きの本格始動へ", source: "時事通信", time: "既報",
        detail: "<p>2026年2月8日投開票の衆院選で、高市早苗首相率いる自民党が定数465に対し単独で3分の2を超える歴史的大勝を収めた。投票率は56.26%と前回（53.85%）を上回った。</p><p>自維連立で過半数割れしていた参院においても、再可決が現実的な選択肢となり、国会審議が大幅に進めやすくなる見通し。高市首相が「歴史的使命」と位置づける憲法9条改正・自衛隊の国防軍化に向けた改憲手続きが本格的に議題に上り始めている。</p><p>一方、連立パートナーの維新は「定数削減」法案の早期成立を連立継続の条件として掲げており、両党の利害調整が政権の最大課題となっている。維新は閣外協力の見直しもほのめかすなど、与党内の緊張感は続いている。</p>" },
      { color: "var(--gold)", icon: "🛢️", tag: "経済", title: "ホルムズ海峡危機でナフサ供給逼迫が深刻化―高市首相「代替調達で年越し可能」と表明", source: "日本経済新聞", time: "既報",
        detail: "<p>2026年2月末に始まったイランによるホルムズ海峡の事実上の封鎖を受け、日本の石油化学産業の基幹原料であるナフサの供給が著しく逼迫している。石油化学工業協会は「供給の蛇口が閉まった状態」と表現し、代替調達の行方を注視している。</p><p>高市首相は4月30日の関係閣僚会議で、ナフサ由来の化学製品について「代替調達が進んだ」として年越し供給が可能との見通しを示した。ただし、プラスチック・合成樹脂・化学繊維の製造原価は直撃を受けており、LPG価格は前月比最大80%高と急騰した。</p><p>医療現場で使われる注射器やゴム手袋も石油由来製品であり、広範な業界への波及が懸念されている。政府は備蓄の活用や代替輸入ルートの確保を急いでいるが、機雷除去には6カ月程度を要するとの見方もあり、中長期的な供給リスクは払拭されていない。</p>" },
      { color: "var(--red)", icon: "📉", tag: "市場", title: "日経平均、ホルムズ封鎖ショックから徐々に回復―5万4000円台で推移", source: "Bloomberg Japan", time: "既報",
        detail: "<p>2026年2月末の米・イスラエルによるイラン空爆とホルムズ海峡封鎖宣言を受け、日経平均株価は週明けの市場で歴史的な急落を記録。6万円目前から一時5万円台前半まで大幅に下落した。</p><p>3月9日（月）には過去3番目の下げ幅を記録したが、翌10日には1519円（+2.88%）の大幅反発。その後も買い戻しの動きが続き、現在は5万4000円台での推移が続いている。</p><p>専門家からは「日経平均の6万円は通過点で上昇余地は大きい」との見方も出ており、中東情勢の緩和と国内企業決算の改善を条件に、年後半に向けた回復シナリオも描かれている。ただし、原油・ナフサ価格の高止まりが製造業の収益を圧迫し、上値を抑える要因となっている。</p>" },
      { color: "var(--blue)", icon: "🤝", tag: "与党", title: "維新「閣外協力の見直し」をちらつかせ自民を牽制―定数削減法案の国会審議が難航", source: "東京新聞", time: "既報",
        detail: "<p>高市・自維連立政権において、連立パートナーの日本維新の会が「衆院定数の1割削減」を閣外協力継続の絶対条件として掲げ、自民党との協議が難航している。維新の吉村洋文代表は定数削減を「改革のセンターピン」と位置づけており、実現できなければ閣外協力の見直しに発展しかねない状況だ。</p><p>衆院の現勢力は自民党201議席・維新34議席で過半数を確保しているが、参院では自民101・維新19の計120議席と過半数まで5議席不足。国民民主か参政どちらかの協力がなければ参院での法案成立が困難なため、高市政権の政策運営には依然として制約がある。</p><p>日経MJが2日に発表した2026年上期ヒット商品番付では、消費トレンドのキーワードとして「P」が選定された。</p>" },
      { color: "var(--purple)", icon: "🏆", tag: "消費", title: "日経MJヒット商品番付2026年上期版を発表―消費トレンドのキーワードは「P」", source: "日経MJ", time: "6/2 午前",
        detail: "<p>日本経済新聞社が毎年恒例の日経MJヒット商品番付2026年上期版を6月2日午前に発表した。今期のキーワードは「P」とされ、物価高（Price）・防衛（Protection）・パーソナライズ（Personalize）など、複数の「P」ワードが消費行動を特徴づけているとの分析だ。</p><p>ホルムズ海峡封鎖による原材料コスト上昇を背景に、節約志向とプレミアム志向が二極化する傾向が顕著。一方で「油断禁物の世の中」を反映したリスク対応型の商品・サービスが大きくリフトアップしたとされている。</p><p>詳細な分析は日経MJの紙面および電子版で確認可能。生解説イベントも同日実施された。</p>" },
    ]
  },

  /* ── 世界情勢 ── */
  world: {
    hero: {
      emoji: "🛢️",
      tag: "地政学",
      title: "ホルムズ海峡「事実上の封鎖」が長期化―1600隻・2.3万人が湾内に孤立、米・イラン交渉は膠着",
      desc: "イランによるホルムズ海峡封鎖は2月末の米・イスラエルによる空爆を機に開始。5月時点でも約1600隻・87カ国2万3000人の船員がペルシャ湾内で立ち往生したまま。米・イランは「1ページのMOU」合意に最接近したとされるが、Project Freedomは一時停止状態が続く。",
      detail: "<p>2026年2月末、米国・イスラエルによるイラン空爆を契機にイランはホルムズ海峡の「事実上の封鎖」を宣言。世界の原油輸送量の約20%、日本のタンカーの93%が通過するこの要衝の閉鎖は、世界経済に深刻な打撃を与えている。</p><p>5月7日時点で約1600隻・87カ国・2万3000人の船員がペルシャ湾内で立ち往生。米国主導のProject Freedomは48時間で一時停止され、実効的な航行再開には至っていない。中国・ロシアの船舶は通航が黙認される一方、日・米・EU籍の商船には拿捕リスクが生じる非対称的な状況が続く。</p><p>国連安保理決議は中露の拒否権で否決。英仏のマクロン大統領がイランと独自外交を展開し、多国籍「海峡安全確保ミッション」への参加を呼びかけているが、機雷除去には6カ月程度を要するとも言われ、完全正常化は見通せない状況だ。</p>",
      source: "Reuters / CNN / global-scm.com",
      time: "継続中"
    },
    items: [
      { color: "var(--red)", icon: "🇮🇷", tag: "中東", title: "イラン、米国との2回目の協議参加を拒否と国営放送が報道―交渉の泥沼化リスクが浮上", source: "IRNA / 三菱UFJリサーチ", time: "既報",
        detail: "<p>イランの国営放送は、米国が提案した2回目の直接協議への参加をイランが拒否したと報じた。米国のトランプ大統領は2026年秋の中間選挙を念頭に早期収束を目指しているとされるが、交渉は実質的に停滞している。</p><p>米国の重大な誤算の一つは、イランがホルムズ海峡を封鎖し続ける実力を保持していた点だ。海峡を通過する船舶を攻撃するのは容易な一方、守るのは困難という構造的問題が露わになっている。CENTCOMはイランの港湾への出入りを対象とした「逆封鎖」措置を発動しているが、根本解決には至っていない。</p><p>三菱UFJリサーチは「ホルムズ海峡封鎖の長期化は、テールリスクではなくリスクシナリオとして位置づけるべき」と分析。2026年秋〜2027年にかけての供給制約と生産活動への下押し圧力を警告している。</p>" },
      { color: "var(--gold)", icon: "⛽", tag: "エネルギー", title: "アジアのLNG価格が40%超急騰、LPGは前月比80%高―化学・製造業の原価直撃", source: "Nikkei Asia / JBpress", time: "既報",
        detail: "<p>ホルムズ海峡封鎖による供給停滞懸念から、アジアのLNG（液化天然ガス）価格は40%超の急騰を記録。LPG価格は前月比最大80%の急騰が報告されており、プラスチック・合成樹脂・化学繊維の製造原価に直撃している。</p><p>日本郵船・商船三井・川崎汽船は3月初旬からホルムズ海峡の通航を停止し、安全海域での待機を継続。Hapag-Lloydは停戦が維持された場合でも、ネットワーク完全回復に6〜8週間かかるとの見方を示している。</p><p>ペルシャ湾は世界の尿素輸出の40〜50%を占めており、封鎖の長期化は肥料供給を通じて世界の食料安全保障にも影響する可能性がある。UNDPは9月にも世界的な食料危機が発生する恐れがあると警告している。</p>" },
      { color: "var(--blue)", icon: "🇫🇷", tag: "外交", title: "マクロン仏大統領がイランと電話会談、英仏主導の「海峡安全確保ミッション」参加を呼びかけ", source: "Reuters", time: "5/6",

// Date
const now = new Date();
const dateEl = document.getElementById('dateBadge');
const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
dateEl.innerHTML = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}<br>${days[now.getDay()]}`;

// Hero Card
function renderHero(data, containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = `
    <div class="hero-card">
      <div class="hero-thumb">
        <div class="hero-thumb-inner">
          <span class="hero-thumb-emoji">${data.emoji}</span>
        </div>
        <div class="hero-overlay"></div>
      </div>
      <div class="hero-body">
        <div class="hero-tag">⬡ ${data.tag}</div>
        <div class="hero-title">${data.title}</div>
        <div class="hero-desc">${data.desc}</div>
        <div class="hero-meta">
          <span class="hero-source">${data.source}</span>
          <span class="hero-time">${data.time}</span>
        </div>
        <div class="tap-hint">▼ タップで詳細を読む</div>
      </div>
    </div>`;
}

// News List
function renderNewsList(items, listId) {
  const el = document.getElementById(listId);
  el.innerHTML = items.map(item => `
    <div class="news-item" style="--item-color:${item.color}">
      <div class="news-icon">${item.icon}</div>
      <div class="news-content">
        <div class="news-tag">${item.tag}</div>
        <div class="news-title">${item.title}</div>
        <div class="news-footer">
          <span class="news-source">${item.source}</span>
          <span class="news-dot"></span>
          <span class="news-time">${item.time}</span>
        </div>
      </div>
      <div class="news-importance"></div>
    </div>`).join('');
}

// Thread List
function renderThreadList(threads, listId) {
  const el = document.getElementById(listId);
  el.innerHTML = threads.map((t, i) => `
    <div class="thread-item" onclick="openModal({tag:t.board,title:t.title,source:'5ch / '+t.board,time:t.replies+'レス',desc:t.preview,detail:t.detail,color:'var(--gold)'})" data-idx="${i}" data-type="aitrend">
      <div class="thread-header">
        <span class="thread-num">#${t.num}</span>
        <span class="thread-board">${t.board}</span>
        ${t.hot ? '<span class="thread-hot">🔥 HOT</span>' : ''}
      </div>
      <div class="thread-title">${t.title}</div>
      <div class="thread-preview">${t.preview.replace(/\n/g,'<br>')}</div>
      <div class="thread-footer">
        <div class="thread-stat"><span class="thread-stat-icon">💬</span><span class="thread-stat-val">${t.replies}</span></div>
        <div class="thread-stat"><span class="thread-stat-icon">👁️</span><span class="thread-stat-val">${t.views}</span></div>
        <div class="tap-hint" style="margin-left:auto">▼ 詳細を読む</div>
      </div>
    </div>`).join('');
  // fix onclick after render
  el.querySelectorAll('.thread-item').forEach((el, i) => {
    el.onclick = () => {
      const t = threads[i];
      openModal({tag: t.board, title: t.title, source: '5ch / ' + t.board, time: t.replies + 'レス', desc: t.preview.replace(/\n/g,' '), detail: t.detail, color: 'var(--gold)'});
    };
  });
}

// Image Gen List

    <div class="imggen-item" data-idx="${i}">

        <span style="font-size:40px;position:relative;z-index:1;opacity:0.6">${item.emoji}</span>

// Count labels
function setCount(id, n) {
  document.getElementById(id).textContent = `${n} articles`;
}

// ── MODAL ──
function openModal({tag, title, source, time, desc, detail, color}) {
  document.getElementById('modalTag').textContent = '⬡ ' + tag;
  document.getElementById('modalTag').style.setProperty('--modal-color', color || 'var(--accent)');
  document.getElementById('modalTag').style.color = color || 'var(--accent)';
  document.getElementById('modalTag').style.borderColor = (color || 'var(--accent)').replace('var(--accent)', 'rgba(0,255,170,0.3)');
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalSource').textContent = source;
  document.getElementById('modalTime').textContent = time;
  document.getElementById('modalSummary').style.setProperty('border-left-color', color || 'var(--accent)');
  document.getElementById('modalSummary').textContent = desc;
  document.getElementById('modalDetail').innerHTML = detail || '<p>詳細情報は準備中です。</p>';
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    _closeModal();
  }
}
function closeModalBtn() { _closeModal(); }
function _closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Tab switching
const tabs = document.querySelectorAll('.tab-btn');
const panels = document.querySelectorAll('.tab-panel');
const scrollArea = document.getElementById('scrollArea');

tabs.forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.tab;
    tabs.forEach(t => t.classList.remove('active'));
    panels.forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + target).classList.add('active');
    scrollArea.scrollTo({ top: 0, behavior: 'instant' });
  });
});

// swipe down to close modal
let startY = 0;
document.getElementById('modalSheet').addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, {passive: true});
document.getElementById('modalSheet').addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - startY > 80) _closeModal();
}, {passive: true});

// ── UPDATE PANEL ──
function openUpdatePanel() {
  document.getElementById('updateOverlay').classList.add('open');
  document.getElementById('updateTextarea').value = '';
  document.getElementById('updateStatus').className = 'update-status';
  setTimeout(() => document.getElementById('updateTextarea').focus(), 300);
}
function closeUpdatePanel() {
  document.getElementById('updateOverlay').classList.remove('open');
}

function applyUpdate() {
  const raw = document.getElementById('updateTextarea').value.trim();
  const statusEl = document.getElementById('updateStatus');
  if (!raw) {
    statusEl.textContent = '⚠ テキストエリアが空です';
    statusEl.className = 'update-status error';
    return;
  }
  try {
    // Extract the object literal from const NEWS_DATA = {...};
    const match = raw.match(/const\s+NEWS_DATA\s*=\s*([\s\S]+?);\s*$/);
    const objStr = match ? match[1] : raw;
    // Use Function constructor to safely evaluate the object
    const newData = new Function('return ' + objStr)();
    if (!newData.domestic || !newData.world || !newData.aitrend || !newData.imagegen || !newData.tech || !newData.agent) {
      throw new Error('必要なキー(domestic/world/aitrend/imagegen/tech/agent)が見つかりません');
    }
    // Apply to global and re-render
    Object.assign(NEWS_DATA, newData);
    reRenderAll();
    statusEl.textContent = '✓ 更新しました！';
    statusEl.className = 'update-status success';
    setTimeout(() => closeUpdatePanel(), 1200);
  } catch(e) {
    statusEl.textContent = '✗ エラー: ' + e.message;
    statusEl.className = 'update-status error';
  }
}

function reRenderAll() {
  renderHero(NEWS_DATA.domestic.hero, 'domestic-hero');
  renderNewsList(NEWS_DATA.domestic.items, 'domestic-list');
  setCount('count-domestic', NEWS_DATA.domestic.items.length + 1);

  renderNewsList(NEWS_DATA.world.items, 'world-list');

  renderThreadList(NEWS_DATA.aitrend, 'aitrend-list');
  setCount('count-aitrend', NEWS_DATA.aitrend.length);
  renderImageGenList(NEWS_DATA.imagegen, 'imagegen-list');
  setCount('count-imagegen', NEWS_DATA.imagegen.length);
  if (NEWS_DATA.tech) {
    renderHero(NEWS_DATA.tech.hero, 'tech-hero');

    setCount('count-tech', NEWS_DATA.tech.items.length + 1);
    attachHeroModal(NEWS_DATA.tech.hero, 'tech-hero', '#ff8c44');
    attachNewsModal(NEWS_DATA.tech.items, 'tech-list');
  }
  if (NEWS_DATA.agent) {
    renderHero(NEWS_DATA.agent.hero, 'agent-hero');
    renderNewsList(NEWS_DATA.agent.items, 'agent-list');
    setCount('count-agent', NEWS_DATA.agent.items.length + 1);
    attachHeroModal(NEWS_DATA.agent.hero, 'agent-hero', '#00e5ff');
    attachNewsModal(NEWS_DATA.agent.items, 'agent-list');
  }
  attachHeroModal(NEWS_DATA.domestic.hero, 'domestic-hero', 'var(--accent)');
  attachNewsModal(NEWS_DATA.domestic.items, 'domestic-list');
  attachHeroModal(NEWS_DATA.world.hero, 'world-hero', 'var(--blue)');
  attachNewsModal(NEWS_DATA.world.items, 'world-list');
}
